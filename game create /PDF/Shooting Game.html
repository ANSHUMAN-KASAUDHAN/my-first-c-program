<!DOCTYPE html>
<html>

<head>
  <title>Shooting Game</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #00ffb3;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #gameCanvas {
      background-color: #000000;
    }

    .mobile-controls {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      display: none;
      justify-content: space-between;
      align-items: flex-end;
      pointer-events: none;
    }

    .mobile-controls.visible {
      display: flex;
    }

    .mobile-btn {
      width: 60px;
      height: 60px;
      background-color: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      pointer-events: auto;
      user-select: none;
    }

    .mobile-btn.shoot {
      background-color: rgba(255, 255, 0, 0.5);
    }

    #login-container,
    #create-account-container {
      background-color: #ffd904;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      text-align: center;
    }

    input {
      margin: 5px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 15px;
    }

    button {
      padding: 10px 15px;
      background-color: #5cb85c;
      color: white;
      border: none;
      border-radius: 15px;
      cursor: pointer;
    }

    button.secondary {
      background-color: #9b5d05;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div id="login-container">
    <h2><u>Login</u></h2>
    <input type="text" id="login-username" placeholder="Username"><br>
    <input type="password" id="login-password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <button class="secondary" onclick="showCreateAccount()">Create Account</button><br>
    <p id="login-error" style="color: red;"></p>
  </div>

  <div id="create-account-container" class="hidden">
    <h2><u>Create Account</h2>
    <input type="text" id="create-username" placeholder="Username"><br>
    <input type="password" id="create-password" placeholder="Password"><br>
    <button onclick="createAccount()">Create Account</button>
    <button class="secondary" onclick="showLogin()">Back to Login</button>
    <p id="create-error" style="color: red;"></p>
  </div>

  <canvas id="gameCanvas" class="hidden"></canvas>

  <div id="mobile-controls" class="mobile-controls">
    <div style="display: flex; gap: 10px;">
      <div id="btn-left" class="mobile-btn">←</div>
      <div id="btn-up" class="mobile-btn">↑</div>
    </div>
    <div id="btn-shoot" class="mobile-btn shoot">🔥</div>
    <div style="display: flex; gap: 10px;">
      <div id="btn-down" class="mobile-btn">↓</div>
      <div id="btn-right" class="mobile-btn">→</div>
    </div>
  </div>

  <script>
    const c = document.getElementById('gameCanvas');
    const ctx = c.getContext('2d');
    const loginContainer = document.getElementById('login-container');
    const createAccountContainer = document.getElementById('create-account-container');
    const loginError = document.getElementById('login-error');
    const createError = document.getElementById('create-error');
    const mobileControls = document.getElementById('mobile-controls');

    const isMobile = () => 'ontouchstart' in window || navigator.maxTouchPoints > 0;

    let currentUser = null;
    const accountsKey = 'gameAccounts';
    let accounts = JSON.parse(localStorage.getItem(accountsKey)) || {};
    const highScoreKey = 'shootingGameHighScore';
    let highScore = parseInt(localStorage.getItem(highScoreKey)) || 0;

    function showCreateAccount() {
      loginContainer.classList.add('hidden');
      createAccountContainer.classList.remove('hidden');
      loginError.textContent = '';
      createError.textContent = '';
    }

    function showLogin() {
      createAccountContainer.classList.add('hidden');
      loginContainer.classList.remove('hidden');
      loginError.textContent = '';
      createError.textContent = '';
    }

    function createAccount() {
      const username = document.getElementById('create-username').value.trim();
      const password = document.getElementById('create-password').value;

      if (!username || !password) {
        createError.textContent = 'Please enter a username and password.';
        return;
      }

      if (accounts[username]) {
        createError.textContent = 'Username already exists.';
        return;
      }

      accounts[username] = password;
      localStorage.setItem(accountsKey, JSON.stringify(accounts));
      createError.textContent = 'Account created successfully. Please log in.';
      showLogin();
    }

    function login() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;

      if (accounts[username] === password) {
        currentUser = username;
        loginContainer.classList.add('hidden');
        createAccountContainer.classList.add('hidden');
        c.classList.remove('hidden');
        startGame();
        loginError.textContent = '';
      } else {
        loginError.textContent = 'Invalid username or password.';
      }
    }

    function startGame() {
      c.width = 600;
      c.height = 400;

      const p = { x: c.width / 2, y: c.height - 30, w: 20, h: 30, color: 'blue', s: 5 };
      const bs = [];
      const bsS = 10;
      const bsR = 5;
      const bsC = 'yellow';
      const es = [];
      const esR = 15;
      const esC = 'red';
      const esS = 2;
      const esI = 60;
      let esIC = 0;
      let currentScore = 0;
      const fI = 10;
      let fIC = 0;

      function dP() { ctx.fillStyle = p.color; ctx.fillRect(p.x - p.w / 2, p.y - p.h, p.w, p.h); }
      function dB(b) { ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill(); ctx.closePath(); }
      function uBs() { for (let i = bs.length - 1; i >= 0; i--) { bs[i].y -= bsS; dB(bs[i]); if (bs[i].y < 0) { bs.splice(i, 1); } } }
      function fB() { bs.push({ x: p.x, y: p.y - p.h / 2, r: bsR, color: bsC }); }
      function sE() { const x = Math.random() * c.width; const y = 0 - esR; es.push({ x: x, y: y, r: esR, color: esC }); }
      function dE(e) { ctx.fillStyle = e.color; ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2); ctx.fill(); ctx.closePath(); }
      function uEs() { for (let i = es.length - 1; i >= 0; i--) { es[i].y += esS; dE(es[i]); if (es[i].y > c.height + esR) { es.splice(i, 1); } } }
      function cC() { for (let i = bs.length - 1; i >= 0; i--) { const b = bs[i]; for (let j = es.length - 1; j >= 0; j--) { const e = es[j]; const dx = b.x - e.x; const dy = b.y - e.y; const d = Math.sqrt(dx * dx + dy * dy); if (d < b.r + e.r) { bs.splice(i, 1); es.splice(j, 1); currentScore++; break; } } } }
      function dS() { ctx.fillStyle = 'white'; ctx.font = '16px Arial'; ctx.fillText('Score: ' + currentScore + ` High Score: ${highScore}`, 10, 20); }

      document.addEventListener('keydown', e => {
        switch (e.key) {
          case 'ArrowLeft': p.x -= p.s; break;
          case 'ArrowRight': p.x += p.s; break;
          case 'ArrowUp': p.y -= p.s; break;
          case 'ArrowDown': p.y += p.s; break;
        }
      });

      if (isMobile()) {
        mobileControls.classList.add('visible');
        let moveLeftInterval = null, moveRightInterval = null, moveUpInterval = null, moveDownInterval = null, shootInterval = null;
        
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        const btnUp = document.getElementById('btn-up');
        const btnDown = document.getElementById('btn-down');
        const btnShoot = document.getElementById('btn-shoot');
        
        btnLeft.addEventListener('touchstart', e => { e.preventDefault(); moveLeftInterval = setInterval(() => { p.x -= p.s; }, 30); });
        btnLeft.addEventListener('touchend', e => { e.preventDefault(); clearInterval(moveLeftInterval); });
        btnRight.addEventListener('touchstart', e => { e.preventDefault(); moveRightInterval = setInterval(() => { p.x += p.s; }, 30); });
        btnRight.addEventListener('touchend', e => { e.preventDefault(); clearInterval(moveRightInterval); });
        btnUp.addEventListener('touchstart', e => { e.preventDefault(); moveUpInterval = setInterval(() => { p.y -= p.s; }, 30); });
        btnUp.addEventListener('touchend', e => { e.preventDefault(); clearInterval(moveUpInterval); });
        btnDown.addEventListener('touchstart', e => { e.preventDefault(); moveDownInterval = setInterval(() => { p.y += p.s; }, 30); });
        btnDown.addEventListener('touchend', e => { e.preventDefault(); clearInterval(moveDownInterval); });
        btnShoot.addEventListener('touchstart', e => { e.preventDefault(); shootInterval = setInterval(fB, 100); });
        btnShoot.addEventListener('touchend', e => { e.preventDefault(); clearInterval(shootInterval); });
      }

      function gameLoop() {
        ctx.clearRect(0, 0, c.width, c.height);
        fIC++;
        if (fIC % fI === 0) { fB(); fIC = 0; }
        esIC++;
        if (esIC % esI === 0) { sE(); esIC = 0; }
        uEs();
        uBs();
        cC();
        dP();
        dS();
        if (p.x < p.w / 2) p.x = p.w / 2;
        if (p.x > c.width - p.w / 2) p.x = c.width - p.w / 2;
        if (p.y < p.h) p.y = p.h;
        if (p.y > c.height) p.y = c.height;

        if (currentScore > highScore) {
          highScore = currentScore;
          localStorage.setItem(highScoreKey, highScore);
        }

        requestAnimationFrame(gameLoop);
      }

      gameLoop();
    }

    function logout() {
      currentUser = null;
      c.classList.add('hidden');
      loginContainer.classList.remove('hidden');
      alert('Logged out.');
    }
  </script>
</body>
</html>
