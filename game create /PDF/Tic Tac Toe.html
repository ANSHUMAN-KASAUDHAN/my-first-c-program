
<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe Game</title>
<style>
  body {
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    grid-template-rows: repeat(3, 100px);
    border: 2px solid black;
  }
  .cell {
    width: 100px;
    height: 100px;
    border: 1px solid black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2em;
    cursor: pointer;
  }
  .cell:nth-child(3n) {
    border-right: none;
  }
  .cell:nth-child(n+7) {
    border-bottom: none;
  }
  .message {
    margin-top: 20px;
    font-weight: bold;
  }
  button {
    margin-top: 10px;
    padding: 8px 15px;
    cursor: pointer;
  }
</style>
</head>
<body>

  <h1><u><i>Tic Tac Toe</i></u></h1>

  <div class="board" id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <div class="message" id="message"></div>
  <button onclick="resetGame()">Reset Game</button>

  <script>
    let board = ['', '', '', '', '', '', '', '', ''];
    let currentPlayer = 'X';
    const cells = document.querySelectorAll('.cell');
    const messageElement = document.getElementById('message');

    function checkWin() {
      const winningCombinations = [
        [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
        [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
        [0, 4, 8], [2, 4, 6]             // Diagonals
      ];

      for (const combo of winningCombinations) {
        const [a, b, c] = combo;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return board[a];
        }
      }
      return null;
    }

    function checkDraw() {
      return board.every(cell => cell !== '');
    }

    function handleCellClick(event) {
      const cell = event.target;
      const index = parseInt(cell.dataset.index);

      if (board[index] === '') {
        board[index] = currentPlayer;
        cell.textContent = currentPlayer;
        cell.classList.add(currentPlayer); // For potential styling

        const winner = checkWin();
        if (winner) {
          messageElement.textContent = `${winner} wins!`;
          disableBoard();
          return;
        }

        if (checkDraw()) {
          messageElement.textContent = "It's a draw!";
          return;
        }

        currentPlayer = 'O';
        messageElement.textContent = "AI's turn...";
        disableBoard();
        setTimeout(makeAIMove, 500); // Add a slight delay for AI move
      }
    }

    function makeAIMove() {
      // Basic AI: Choose the first empty cell
      let bestMove = -1;
      for (let i = 0; i < board.length; i++) {
        if (board[i] === '') {
          bestMove = i;
          break;
        }
      }

      if (bestMove !== -1) {
        board[bestMove] = 'O';
        cells[bestMove].textContent = 'O';
        cells[bestMove].classList.add('O');

        const winner = checkWin();
        if (winner) {
          messageElement.textContent = `${winner} wins!`;
          disableBoard();
          return;
        }

        if (checkDraw()) {
          messageElement.textContent = "It's a draw!";
          return;
        }

        currentPlayer = 'X';
        messageElement.textContent = "Your turn...";
        enableBoard();
      }
    }

    function disableBoard() {
      cells.forEach(cell => cell.onclick = null);
    }

    function enableBoard() {
      cells.forEach(cell => cell.onclick = handleCellClick);
    }

    function resetGame() {
      board = ['', '', '', '', '', '', '', '', ''];
      currentPlayer = 'X';
      messageElement.textContent = '';
      cells.forEach(cell => {
        cell.textContent = '';
        cell.classList.remove('X', 'O');
      });
      enableBoard();
    }

    enableBoard(); // Initialize event listeners
  </script>

</body>
</html>
